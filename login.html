<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>

<header>
    <h2 class="logo">Shelve</h2>
    <img src="logo.png" alt="Shelve logo">
</header>

<main>
    <section class="login-container">
        
        <h2>Welcome Back</h2>
        <h3>Please Log In</h3>
        
        <form id="login-form">

            <input
                type="text"
                id="flat_no"
                placeholder="Flat Number"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Log In
            </button>

        </form>
        
        
        <p>
            Don't have an account?
            <a href="signup.html">
                Sign Up
            </a>
        </p>
    </section>
</main>

</body>

<script src="login.js"></script>
</html>
