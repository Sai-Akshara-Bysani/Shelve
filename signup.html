<!DOCTYPE html>
<html>
<head>
    <title>SignUp</title>
</head>

<body>

<header>
    <h2 class="logo">Shelve</h2>
    <img src="logo.png" alt="Shelve logo">
</header>

<form id="signup-form">

    <input
        type="text"
        id="username"
        placeholder="Name"
        required
    >

    <input
        type="text"
        id="flat_no"
        placeholder="Flat Number (ex. A1-001)"
        required
    >

    <input
        type="tel"
        id="phone_no"
        placeholder="Phone Number"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Sign Up
    </button>

</form>

</body>

<script src="signup.js"></script>
</html>
