<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search · Shelve</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user) window.location.href = "login.html";
    </script>

    <style>
        /* Chat buddy widget — scoped styles so it doesn't depend on style.css */
        #chat-toggle {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: #2f2a25;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
            z-index: 1000;
        }

        #chat-panel {
            position: fixed;
            bottom: 156px;
            right: 20px;
            width: 320px;
            max-width: calc(100vw - 40px);
            height: 420px;
            max-height: calc(100vh - 220px);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        #chat-panel.hidden { display: none; }

        #chat-header {
            background: #2f2a25;
            color: #fff;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Fraunces', serif;
        }

        #chat-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f7f4ef;
        }

        .chat-msg {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .chat-bot, .chat-bot-loading {
            background: #fff;
            border: 1px solid #e3ddd2;
            align-self: flex-start;
            color: #2f2a25;
        }

        .chat-bot-loading { opacity: 0.6; font-style: italic; }

        .chat-user {
            background: #2f2a25;
            color: #fff;
            align-self: flex-end;
        }

        #chat-input-row {
            display: flex;
            border-top: 1px solid #e3ddd2;
        }

        #chat-input {
            flex: 1;
            border: none;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }

        #chat-send {
            border: none;
            background: #2f2a25;
            color: #fff;
            padding: 0 16px;
            cursor: pointer;
        }

        #chat-toggle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>

<body class="page">

<header>
    <h2 class="logo">Shelve</h2>
    <img src="logo.png" alt="Shelve logo">
</header>

<main>
    <section class="search-section">
        <input type="text" id="search-input" placeholder="Search books, authors...">
        <button id="search-btn">Search</button>
    </section>

    <section class="filters">
        <select id="availability-filter">
            <option value="all">All Books</option>
            <option value="available">Available</option>
            <option value="borrowed">Borrowed</option>
        </select>

        <select id="category">
            <option value="">All Categories</option>
            <option value="Thriller">Thriller</option>
            <option value="Mystery">Mystery</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Romance">Romance</option>
            <option value="Self-Help">Self-Help</option>
            <option value="Biography">Biography</option>
            <option value="Academic">Academic</option>
        </select>
    </section>

    <section class="search-results">
        <h2>Books</h2>

        <div id="books-container">
        </div>
    </section>

</main>

<!-- Shelve Buddy chat widget -->
<button id="chat-toggle" title="Ask Shelvy"><img src="shelvy.png" alt="💬"></button>
<div id="chat-panel" class="hidden">
    <div id="chat-header">
        <span>Shelve Buddy</span>
        <button id="chat-close">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
        <input id="chat-input" placeholder="What are you looking for?">
        <button id="chat-send">Send</button>
    </div>
</div>

<footer>
    <nav>
        <a href="index.html" class="nav">Home</a>
        <a href="search.html" class="nav-active">Search</a>
        <a href="add.html" class="nav">Add</a>
        <a href="profile.html" class="nav">My Books</a>
    </nav>
</footer>

<script src="search.js"></script>
</body>
</html>
