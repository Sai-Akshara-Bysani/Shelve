<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>

<body>
<header>
    <h2 class="logo">Shelve</h2>
    <img src="logo.png" alt="Shelve logo">
</header>

<main>
    <section class="username">
        <img src="profile.jpg" alt="Profile Picture">
        <h3 class="user_name"></h3>
        <h4 class="books_borrowed"></h4>
        <h4 class="books_lent"></h4>
    </section>

    <section class="stats">

        <div class="stat-card">
            <h3 id="lent-count">0</h3>
            <p>Books Lent</p>
        </div>

        <div class="stat-card">
            <h3 id="borrowed-count">0</h3>
            <p>Books Borrowed</p>
        </div>

    </section>

    <section class="borrowed-books">
        <h2>Currently Borrowed</h2>

        <div id="borrowed-books-container">
        </div>
    </section>

    <section class="my-books">
        <h2>My Books</h2>

        <div id="my-books-container">
        </div>
    </section>

    <section class="requests">
        <h2>Borrow Requests</h2>

        <div id="requests-container">
        </div>
    </section>

    <section class="log-out">
        <h3>Log Out</h3>
    </section>

</main>

<footer>
    <nav>
        <a href="index.html" class="nav">Home</a>
        <a href="search.html" class="nav">Search</a>
        <a href="add.html" class="nav">Add</a>
        <a href="profile.html" class="nav-active">Profile</a>
    </nav>
</footer>

</body>
</html>
